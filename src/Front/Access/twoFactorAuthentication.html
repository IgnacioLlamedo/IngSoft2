<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/Images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/Access/accessCommon.css">
    <title>CEF - Recuperar contraseña</title>
</head>
<body>
    <main>
        <div class="form-container">
            <form id="two-factor-authenticator-form">
                <section>

                    <h1>Autenticación de doble factor</h1>

                    <div class="input-section">

                        <span>Ingresá el código recibido por email:</span>
                        <input type="number" name="codigo" required placeholder="Código recibido por email">                    
                    </div>

                </section>

                <section>
                    <button>VALIDAR CÓDIGO</button>
                    <button>VOLVER A ENVIAR</button>
                </section>
            </form>
        </div>
    </main>
</body>
</html>
