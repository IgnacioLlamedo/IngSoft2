<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/Images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/Access/accessCommon.css">
    <title>CEF - Recuperar contraseña</title>
</head>
<body>
    <main>
        <div class="form-container">
            <form id="reset-password-form">
                <section>

                    <h1>Reiniciar contraseña</h1>

                    <div class="input-section">

                        <input id="password" type="password" name="contraseña" required placeholder="Nueva contraseña"> 
                        <p id="passwordRequirementError" class="errorMsg hidden"></p>
                        
                        <input id="confirmPassword" type="password" required placeholder="Confirmar nueva contraseña">                    
                        <p id="confirmPasswordError" class="errorMsg hidden"></p>

                    </div>

                </section>

                <section>
                    <button>REINICIAR CONTRASEÑA</button>
                </section>
            </form>
        </div>
    </main>
</body>
<script src="/Access/resetPassword.js"></script>
</html>
