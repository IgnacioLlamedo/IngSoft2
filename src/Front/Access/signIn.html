<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Access/accessCommon.css">
    <link rel="stylesheet" href="/Access/signInStyle.css">
    <title>CEF - Iniciar sesión</title>
</head>
<body>
    <main>
        <div class="form-container">
            <form id="login-form">
                <section>

                    <h1>Iniciar sesión</h1>

                    <div class="input-section">

                        <input type="email" name="mail" required placeholder="Email registrado">
                        <input type="password" name="contraseña" required placeholder="Contraseña">                        

                    </div>

                    <a href="/access/recover-password">¿Olvidaste tu contraseña?</a>

                </section>

                <section>
                    <!-- autenticación -->
                    <button>INICIAR SESIÓN</button>
                </section>
            </form>
        </div>
    </main>
</body>
</html>
