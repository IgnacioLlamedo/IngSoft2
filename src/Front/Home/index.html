<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Home/style.css">
    <title>CEF</title>
</head>
<body>
    
    <header>
 
        <nav class="header-nav">

            <a href="/">
                <img class="logo-img" src="Images/Logo.png" alt="Logo">
            </a>
            
            <ul>
                <li><a href="/access/register">Registrarse</a></li>
                <li><a href="/access/login">Iniciar Sesión</a></li>
            </ul>
            
            <img class="user-ico" id="userIcon" src="Images/user_ico.webp" alt="Opciones de usuario">

            <div class="user-options-menu" id="userOptions">

                <div class="user-options-wrapper">

                    <div class="user-options-list">

                        <a href="/account/user">
                            <img src="Images/account_ico.webp" alt="Cuenta">
                            <p>Cuenta</p>
                        </a>

                        <a>
                            <img src="Images/assistance.webp" alt="Asistencias">
                            <p>Asistencia</p>
                        </a>

                        <a>
                            <img src="Images/logout_ico.webp" alt="Cerrar sesión">
                            <p>Cerrar sesión</p>
                        </a>

                    </div>

                </div>

            </div>

        </nav>
        
        <script>
            const userIcon = document.getElementById("userIcon");
            const userOptions = document.getElementById("userOptions");

            userIcon.addEventListener("click", () => {
                userOptions.classList.toggle("user-options-open")
            })

            document.addEventListener("click", (e) => {
                if (!userIcon.contains(e.target) && !userOptions.contains(e.target))
                    userOptions.classList.remove("user-options-open");
            });
        </script>
        

    </header>


</body>
</html>
