<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/Images/Common/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/Home/Tabs/Table/tableStyle.css">
  <!--<link rel="stylesheet" href="tStyle.css">-->
  <title>Tabla de Horarios</title> 
</head>
<body>
    <div class="table-container">
        <div class="week-nav-wrapper">
            <div class="week-nav">
                <button id="prevWeek">&larr;</button>
                <div class="week-display" id="weekDisplay">13/04 - 18/04</div>
                <button id="nextWeek">&rarr;</button>
            </div>
        </div>
        

        <table id="tablaHorarios">

        </table>
    </div>



    <div class="panel-pago" id="panelPago">
        <div class="panel-contenido">
            <span class="cerrar-panel" onclick="cerrarPanel()">&times;</span>

            <h2 id="tituloClase"></h2>
            
            <p>
                Precio por clase:
                <span id="precioClase"></span>
            </p>

            <p>
                Fecha:
                <span id="fechaClase"></s>
            </p>

            <p>
                Capacidad:
                <span id="capacidad"></span>
            </p>

            <p>
                Sala:
                <span id="salaClase"></span>
            </p>

            <div class="botones-pago">
                <button id="btnClaseUnica" class="paymentButtons" hidden onclick="mostrarOpcionesClaseUnica()">Pagar clase única</button>
                <button id="btnMensual" class="paymentButtons" hidden onclick="pagarMensual()">Pagar Mensualidad</button>
                <div class="contenedor-opciones-unica">
                    <button id="btnSeña" class="unica-opciones" hidden onclick="pagarSeñaClaseUnica()">Señar clase única</button>
                    <button id="btnCompleta"class="unica-opciones" hidden onclick="pagarTotalidadClaseUnica()">Pagar total clase única</button>
                </div>
                <div class="contenedor-volver">
                    <button id="btnVolver" class="btn-volver" hidden onclick="volverOpcionesPago()">← Volver</button>
                </div>
            </div>
            <div id="mensajePago" class="mensaje-pago"></div>
    </div>

    <!-- Modal de asistencia -->
    <div class="modalAsistencia" id="asistenciaModal">
    <div class="modalAsistencia-content">
        <span class="close" id="closeAsistencia">&times;</span>
        <div id="asistenciaBody">
            <h3>${clase} (${horario})</h3>
            <p>Fecha: ${fecha}</p>
            <p>Sala: ${sala}</p>
            <button id="btnQR">Tomar asistencia QR</button>
            <div style="margin-top:10px;">
            <input type="text" id="dniInput" placeholder="Ingrese DNI">
            <button id="btnDNI">Tomar asistencia DNI</button>
            </div>
        </div>
    </div>
    </div>


    
    <!-- Script para asignar data-clase y abrir el panel -->
    <script src="/Home/Tabs/Table/weekNav.js"></script>

    <!---->
    <script src="/Home/Tabs/Table/payPanel.js"></script>

    <script src="/Home/Tabs/Table/classSlot.js"></script>

</body>
</html>
