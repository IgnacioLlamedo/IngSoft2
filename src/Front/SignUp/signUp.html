<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="SignUp/signUpStyle.css">
    <title>CEF - Registrarse</title>
</head>
<body>
    <div class="container-form">
        <form id="register-form">
            <section>

                <h2>Registrarse</h2>

                <div class="input-section">

                    <input type="text" placeholder="Nombre completo">
                    <input type="text" placeholder="DNI">
                    <input type="email" placeholder="Ingrese correo electrónico">
                    <input type="password" placeholder="Ingrese contraseña">
                    <input type="password" placeholder="Ingrese la misma contraseña">
                    <input type="date" placeholder="Fecha de nacimiento">
                    <input type="tel" placeholder="Número de telefono celular">
                    
                    <select name="" id="">
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>
                    
                    

                </div>

            </section>

            

            <section>

                <h2>Planilla médica</h2>
                <div class="input-section">

                    <h3>Contacto de emergencia</h3>

                    <input type="text" placeholder="Nombre completo">
                    <input type="text" placeholder="Relación">
                    <input type="tel" placeholder="Teléfono">

                    <h3>Antecedentes médicos</h3>
 
                    <label>
                        <input class="checkbox" type="checkbox">
                        Hipertensión
                    </label>
                    
                    <label>
                        <input class="checkbox" type="checkbox">
                        Diabetes
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Asma
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Cardiacos
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Artitris
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Epilepsia
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Lesiones
                    </label>

                    <input type="text" placeholder="Otros antecedentes médicos">

                    <h3>Información adicional de salud</h3>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Fuma
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Consume alcohol
                    </label>

                    <label>
                        <input class="checkbox" type="checkbox">
                        Sintomas recientes
                    </label>

                    <input type="text" placeholder="Horas de sueño">

                    <label>
                        <input class="checkbox" type="checkbox">
                        Dificultad para dormir
                    </label>
                    
                    

                    <input type="text" placeholder="Dieta/Nutrición">

                    <h3>Historial de cirugías</h3>

                    <input type="text" placeholder="Descripción de la cirugía">
                    <input type="date" placeholder="Fecha de ">
                    <input type="text" placeholder="Secuelas de la cirugía">

                    <h3>Alegias y medicación</h3>

                    <input type="text" placeholder="Alergias">
                    <input type="text" placeholder="Medicación actual">

                    <h3>Actividad física y objetivos</h3>

                    <label>
                        <input class="checkbox" name="ACTIVIDADFISICA" type="checkbox">
                        Realiza actividad física
                    </label>

                    <input type="text" placeholder="Frecuencia">

                    <select name="" id="">
                        <option value="0">Perdida de peso</option>
                        <option value="1">Tonificación</option>
                        <option value="2">Salud</option>
                        <option value="3">Competencia</option>
                    </select>

                </div>

            </section>

            <section>
                <button>REGISTRARSE</button>
            </section>
        </form>
    </div>

    <script src="signUpLogic.js"></script>
</body>
</html>
